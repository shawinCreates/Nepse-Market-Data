name: Historical Backfill (2010–Present)

permissions:
  contents: write
  
on:
  schedule:
    # 12:00 AM NPT (Nepal Time = UTC+5:45) → 18:15 UTC previous day
    - cron: "15 18 * * *"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run historical backfill (2010 → present)
        run: scrapy crawl market_history

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Data/

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Historical backfill - $(TZ='Asia/Katmandu' date '+%Y-%m-%d %H:%M %Z')"
            git push
          fi